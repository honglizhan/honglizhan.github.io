<!DOCTYPE html>
<html lang="en">

  <head>
    {% include head.html %}
    {% include scripts/mathjax.html %}
  </head>

  <body class="{% if site.navbar_fixed %}fixed-top-nav{% endif %} {% unless site.footer_fixed %}sticky-bottom-footer{% endunless %}">

    <!-- Header -->

    {% include header.html %}

    <!-- Content -->

    <div class="container mt-5">
      {{ content }}
    </div>

    <!-- Footer -->

    {% include footer.html %}

    {% include scripts/bootstrap.html %}
    {% include scripts/mansory.html %}
    {% include scripts/misc.html %}

    <!-- globe.js sends its call-home beacon immediately after injecting the widget.
         Keep the parent measurable because the script forwards its width with the beacon. -->
    <div class="mapmyvisitors-tracker" aria-hidden="true">
      <script type="text/javascript" id="mmvst_globe" src="https://mapmyvisitors.com/globe.js?d=nuvzYNrORqAKjMSEskF0tOsLT_GBVNLlK-0Zz8etIHw"></script>
    </div>
    <style>
      .mapmyvisitors-tracker {
        position: absolute;
        width: 200px;
        height: 0;
        overflow: hidden;
        visibility: hidden;
        pointer-events: none;
      }
    </style>

  </body>

</html>
