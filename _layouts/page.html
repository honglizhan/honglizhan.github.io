---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title{% if page.title_class %} {{ page.title_class }}{% endif %}">{{ page.title }}</h1>
    <p class="post-description{% if page.description_class %} {{ page.description_class }}{% endif %}">{{ page.description }}</p>
  </header>

  <article>
    {{ content }}
  </article>

</div>
